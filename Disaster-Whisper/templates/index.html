<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper | Environmental Check</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="logo">
                <i class="ph ph-wind"></i>
                <h1>Whisper</h1>
            </div>
            <p class="subtitle">Your peaceful environmental check</p>
        </header>

        <main class="main-content">
            <section class="search-section card">
                <form id="assessment-form" class="search-form">
                    <div class="input-group">
                        <i class="ph ph-map-pin"></i>
                        <input type="text" id="city-input" placeholder="Where are you?" required autocomplete="off">
                    </div>
                    <button type="submit" class="btn-primary" id="analyze-btn">
                        <i class="ph ph-magnifying-glass"></i>
                    </button>
                </form>
            </section>

            <div id="results-container" class="results-container hidden">
                <div class="results-grid">
                    <section class="status-section card" id="risk-card">
                        <div class="risk-display">
                            <div class="risk-ring" id="risk-ring">
                                <h3 id="risk-text">Low</h3>
                            </div>
                        </div>
                        <p class="status-subtitle" id="status-subtitle">Conditions are peaceful.</p>
                        
                        <div class="alerts-container" id="alerts-container">
                            <!-- Alerts will be injected here -->
                        </div>
                    </section>

                    <div class="side-content">
                        <section class="data-section card">
                            <h3>Current Climate</h3>
                            <div class="metrics-grid">
                                <div class="metric-box">
                                    <i class="ph ph-thermometer"></i>
                                    <div>
                                        <span class="metric-value" id="val-temp">--°C</span>
                                        <span class="metric-label">Temp</span>
                                    </div>
                                </div>
                                <div class="metric-box">
                                    <i class="ph ph-drop"></i>
                                    <div>
                                        <span class="metric-value" id="val-humidity">--%</span>
                                        <span class="metric-label">Humidity</span>
                                    </div>
                                </div>
                                <div class="metric-box">
                                    <i class="ph ph-wind"></i>
                                    <div>
                                        <span class="metric-value" id="val-wind">--</span>
                                        <span class="metric-label">km/h</span>
                                    </div>
                                </div>
                                <div class="metric-box">
                                    <i class="ph ph-cloud-rain"></i>
                                    <div>
                                        <span class="metric-value" id="val-rain">--</span>
                                        <span class="metric-label">mm Rain</span>
                                    </div>
                                </div>
                                <div class="metric-box">
                                    <i class="ph ph-leaf"></i>
                                    <div>
                                        <span class="metric-value" id="val-aqi">--</span>
                                        <span class="metric-label">AQI</span>
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section class="action-section card">
                            <h3>Suggestions</h3>
                            <ul class="recommendation-list" id="recommendation-list">
                                <!-- Recommendations will be injected here -->
                            </ul>
                        </section>
                    </div>
                </div>
            </div>
            
            <!-- Loading State -->
            <div id="loading-state" class="loading-state hidden">
                <div class="pulse-ring"></div>
                <p>Feeling the breeze...</p>
            </div>
            
        </main>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
